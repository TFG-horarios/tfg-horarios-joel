services:
  nginx:
    image: nginx:1.29-alpine
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  frontend:
    image: ${GHCR_FRONTEND_IMAGE:-ghcr.io/local/tfg-horarios-frontend}:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8080}
        COOKIE_SECURE: ${COOKIE_SECURE:-false}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8080}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    image: ${GHCR_BACKEND_IMAGE:-ghcr.io/local/tfg-horarios-backend}:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN_SECONDS: ${JWT_EXPIRES_IN_SECONDS:-86400}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  migrate:
    image: ${GHCR_BACKEND_IMAGE:-ghcr.io/local/tfg-horarios-backend}:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ['bun', 'run', 'db:migrate']
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
