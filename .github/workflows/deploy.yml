name: Deploy / Docker Compose

on:
  workflow_run:
    workflows: ['CI / Tests, Quality and Covergage']
    types: [completed]
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
      backend_image: ${{ steps.meta.outputs.backend_image }}
    steps:
      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          REPOSITORY="${GITHUB_REPOSITORY,,}"
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "image_tag=${SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${REPOSITORY}/frontend" >> "$GITHUB_OUTPUT"
          echo "backend_image=ghcr.io/${REPOSITORY}/backend" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.image_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.backend_image }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.APP_URL }}
            INTERNAL_API_URL=http://backend:8080
            COOKIE_SECURE=false
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.frontend_image }}:latest

  deploy:
    needs: build
    runs-on: [self-hosted, tfg-prod]
    environment: production
    env:
      DEPLOY_DIR: /opt/tfg-horarios
      APP_URL: ${{ vars.APP_URL }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      JWT_EXPIRES_IN_SECONDS: ${{ vars.JWT_EXPIRES_IN_SECONDS || '86400' }}
      GHCR_FRONTEND_IMAGE: ${{ needs.build.outputs.frontend_image }}
      GHCR_BACKEND_IMAGE: ${{ needs.build.outputs.backend_image }}
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
    steps:
      - name: Checkout deployment files
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build.outputs.image_tag }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare deployment directory
        run: |
          mkdir -p "$DEPLOY_DIR/nginx"
          cp docker-compose.prod.yml "$DEPLOY_DIR/docker-compose.prod.yml"
          cp nginx/default.conf "$DEPLOY_DIR/nginx/default.conf"

      - name: Write production environment
        run: |
          cat > "$DEPLOY_DIR/.env" <<EOF
          APP_URL=${APP_URL}
          NEXT_PUBLIC_API_URL=${APP_URL}
          INTERNAL_API_URL=http://backend:8080
          FRONTEND_URL=${APP_URL}
          COOKIE_SECURE=false
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${POSTGRES_DB}
          DATABASE_URL=postgres://${POSTGRES_USER}:${{ secrets.POSTGRES_PASSWORD }}@db:5432/${POSTGRES_DB}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN_SECONDS=${JWT_EXPIRES_IN_SECONDS}
          SERVER_IDLE_TIMEOUT_SECONDS=255
          GHCR_FRONTEND_IMAGE=${GHCR_FRONTEND_IMAGE}
          GHCR_BACKEND_IMAGE=${GHCR_BACKEND_IMAGE}
          IMAGE_TAG=${IMAGE_TAG}
          EOF

      - name: Deploy containers
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --remove-orphans
          docker compose -f docker-compose.prod.yml restart nginx

      - name: Smoke test
        id: smoke
        run: |
          curl --fail --retry 12 --retry-delay 5 "${APP_URL}/healthz"

      - name: Show deployment diagnostics
        if: failure() && steps.smoke.outcome == 'failure'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          docker compose -f docker-compose.prod.yml ps
          docker compose -f docker-compose.prod.yml logs --tail=120 backend nginx
