name: CI / Tests, Quality and Covergage

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  test-and-sonar:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: horarios_tfg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d horarios_tfg"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: "postgres://dummy_user:dummy_pass@localhost:5432/dummy_db"
      FRONTEND_URL: "http://localhost:3000"
      JWT_SECRET: "super_secret_dummy_key_for_testing_purposes"
      JWT_EXPIRES_IN_SECONDS: "86400"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
        working-directory: ./frontend

      - name: Run Backend Tests & Coverage
        run: bun run test:coverage
        working-directory: ./backend

      - name: Run Frontend Tests & Coverage
        run: bun run test:coverage 
        working-directory: ./frontend

      - name: Apply E2E database migrations
        run: bun run db:migrate
        working-directory: ./backend
        env:
          DATABASE_URL: "postgres://admin:admin@127.0.0.1:5432/horarios_tfg"

      - name: Build Frontend for E2E
        run: bun run build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: "http://127.0.0.1:8080"
          INTERNAL_API_URL: "http://127.0.0.1:8080"
          COOKIE_SECURE: "false"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Run E2E Tests
        run: bun run test:e2e
        working-directory: ./frontend
        env:
          DATABASE_URL: "postgres://admin:admin@127.0.0.1:5432/horarios_tfg"
          FRONTEND_URL: "http://127.0.0.1:3100"
          E2E_BASE_URL: "http://127.0.0.1:3100"
          E2E_API_URL: "http://127.0.0.1:8080"
          E2E_FRONTEND_PORT: "3100"
          E2E_BACKEND_PORT: "8080"
          JWT_SECRET: "super_secret_dummy_key_for_testing_purposes"
          JWT_EXPIRES_IN_SECONDS: "86400"
          COOKIE_SECURE: "false"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results/
          if-no-files-found: ignore

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.javascript.lcov.reportPaths=coverage/backend/lcov.info,coverage/frontend/lcov.info
            -Dsonar.test.inclusions=**/*.test.ts,**/*.test.tsx
            -Dsonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**
            -Dsonar.sources=frontend/src,backend/src
